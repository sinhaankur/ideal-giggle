name: Release Electron Desktop App

# Build & publish installable desktop builds (mac/win/linux) to a GitHub Release
# whenever a tag matching v* is pushed (or manually via workflow_dispatch).
#
# Output artifacts (per OS, attached to the Release):
#   - macOS:   EMPATHEIA-<version>-mac-x64.dmg / -arm64.dmg / .zip
#   - Windows: EMPATHEIA-<version>-win-x64.exe (NSIS installer + portable)
#   - Linux:   EMPATHEIA-<version>-linux-x64.AppImage / .deb

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag name for the manual release (e.g. v0.1.0)"
        required: true
        default: "v0.0.0-manual"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static export for Electron
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          STATIC_EXPORT: "true"
          ELECTRON_BUILD: "true"
          NEXT_PUBLIC_STATIC_EXPORT: "true"
          NEXT_PUBLIC_DEFAULT_PROVIDER: "ollama"
        run: pnpm build:electron

      - name: Build installer (macOS)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm exec electron-builder --mac --publish never

      - name: Build installer (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec electron-builder --win --publish never

      - name: Build installer (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec electron-builder --linux --publish never

      - name: Collect installers
        shell: bash
        run: |
          mkdir -p staged
          # Only ship the user-facing installers, not the unpacked dirs / blockmaps.
          shopt -s nullglob
          for f in dist-electron/*.{dmg,zip,exe,AppImage,deb}; do
            cp "$f" staged/
          done
          ls -la staged

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: empatheia-${{ matrix.os }}
          path: staged/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" \) -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Resolve tag name
        id: tagname
        run: |
          if [ -n "${{ inputs.release_tag }}" ]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tagname.outputs.tag }}
          name: EMPATHEIA ${{ steps.tagname.outputs.tag }}
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true
